<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Sensitive Data Detector</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 12px;
      width: 260px;
      background: #f9f9f9;
      color: #333;
    }
    h1 {
      font-size: 16px;
      margin: 0 0 10px 0;
      color: #d9534f;
    }
    p {
      font-size: 14px;
      margin: 0 0 8px 0;
    }
    .status {
      background: #ffe5b4;
      border: 1px solid #ff9900;
      padding: 8px;
      border-radius: 6px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <h1>🔒 Sensitive Data Detector</h1>
  <p class="status">Extension is <b>active</b> and monitoring inputs.</p>
  <p>Detected sensitive data will be highlighted or blocked automatically.</p>
</body>
</html>
